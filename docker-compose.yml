services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # The database is persisted through the mounted volume.
    # Remove the volume mount if you want an ephemeral development database.

  frontend:
    build: ./frontend
    ports:
      - "8081:80" # Frontend is available at http://localhost:8081
    depends_on:
      - backend
